name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          node --version
          npm --version
          npm ci
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm ci failed due to lock validation; retrying with npm install."
            npm install
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Install dependencies (Linux / macOS)
        if: matrix.platform != 'win'
        run: |
          node --version
          npm --version
          npm install --ignore-optional

      - name: Build and Package (Windows)
        if: matrix.platform == 'win'
        run: npm run build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package (Linux)
        if: matrix.platform == 'linux'
        run: npm run build && npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: 'electron-builder'

      - name: Build and Package (macOS)
        if: matrix.platform == 'mac'
        run: npm run build && npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List release files (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          if (Test-Path release) { Get-ChildItem -Recurse release }

      - name: List release files (Linux / macOS)
        if: matrix.platform != 'win'
        run: |
          if [ -d release ]; then
            ls -laR release
          fi

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.yml
            release/latest.yml
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/latest-linux.yml
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/latest-mac.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download

            **Windows:** `QuizlabReader-Setup-*.exe` — run the installer.

            **Linux:** `*.AppImage` (run directly) or `*.deb` (install with dpkg).

            **macOS:** `*.dmg` — open and drag to Applications.

            ## Features
            - **Google Gemini Integration (CLI)**
            - **Magic Selector** for Universal AI Chat
            - **Multi-language support (EN, TR)**
            - **Dual-Pane PDF Reader**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
