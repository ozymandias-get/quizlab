<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizlab Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #000000;
        --surface: rgba(7, 14, 24, 0.72);
        --surface-border: rgba(170, 220, 255, 0.22);
        --title: #f7fbff;
        --body: #a9bbcd;
        --accent-a: #4fd1ff;
        --accent-b: #ffcc78;
        --accent-c: #8af8ca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        margin: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Space Grotesk', sans-serif;
        overflow: hidden;
        user-select: none;
        cursor: default;
      }

      .ambient {
        position: absolute;
        inset: 0;
        background: #000000;
        animation: none;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(132, 162, 190, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(132, 162, 190, 0.07) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black 38%, transparent 95%);
        opacity: 0;
      }

      .shell {
        position: relative;
        width: min(640px, 90vw);
        border-radius: 24px;
        padding: 38px 36px 28px;
        display: flex;
        flex-direction: column;
        gap: 26px;
        background: var(--surface);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 32px 90px rgba(2, 10, 24, 0.72),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(14px);
        transform: translateY(6px);
        animation: shellEntrance 0.9s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      }

      .shell::after {
        content: '';
        position: absolute;
        inset: 1px;
        border-radius: 23px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        pointer-events: none;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .mark-wrap {
        position: relative;
        height: 56px;
        width: 56px;
      }

      .mark-glow {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(79, 209, 255, 0.42), transparent 68%);
        filter: blur(7px);
        animation: glowPulse 1.8s ease-in-out infinite;
      }

      .mark {
        position: relative;
        height: 56px;
        width: 56px;
        filter: drop-shadow(0 10px 20px rgba(1, 18, 38, 0.46));
      }

      .app-title {
        margin: 0;
        font-size: clamp(30px, 4vw, 42px);
        line-height: 1;
        letter-spacing: -0.03em;
        font-weight: 700;
        color: var(--title);
        background: linear-gradient(105deg, #ffffff 0%, #d3f0ff 45%, #ffe3b1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: titlePulse 2.2s ease-in-out infinite;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--body);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: 'IBM Plex Mono', monospace;
      }

      .meter {
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(130, 160, 186, 0.18);
        border: 1px solid rgba(150, 186, 217, 0.2);
        position: relative;
      }

      .meter::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(79, 209, 255, 0.06), rgba(255, 204, 120, 0.06));
      }

      .meter-bar {
        height: 100%;
        width: 44%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-a), var(--accent-c), var(--accent-b));
        box-shadow: 0 0 18px rgba(79, 209, 255, 0.5);
        transform: translateX(-110%);
        animation: barTravel 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent-c);
        box-shadow: 0 0 12px rgba(138, 248, 202, 0.7);
        animation: dotPulse 1.4s ease-in-out infinite;
      }

      .status-text {
        margin: 0;
        color: #d2dfec;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .build-text {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: rgba(191, 208, 225, 0.64);
        opacity: 0;
        animation: fadeIn 0.7s ease-out 0.5s forwards;
      }

      @keyframes ambientDrift {
        0% {
          transform: scale(1) translate3d(0, 0, 0);
        }

        100% {
          transform: scale(1.04) translate3d(-1.2%, 0.8%, 0);
        }
      }

      @keyframes shellEntrance {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.985);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes glowPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.78;
        }

        50% {
          transform: scale(1.12);
          opacity: 0.4;
        }
      }

      @keyframes titlePulse {
        0%,
        100% {
          filter: brightness(1);
        }

        50% {
          filter: brightness(1.13);
        }
      }

      @keyframes barTravel {
        0% {
          transform: translateX(-110%);
        }

        65% {
          transform: translateX(142%);
        }

        100% {
          transform: translateX(142%);
        }
      }

      @keyframes dotPulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.24);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      .quit-btn {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'IBM Plex Mono', monospace;
        opacity: 0;
        pointer-events: none;
        animation: fadeIn 0.6s ease-out 5s forwards;
      }

      .quit-btn.visible {
        pointer-events: auto;
      }

      .quit-btn:hover {
        background: rgba(255, 60, 80, 0.12);
        border-color: rgba(255, 80, 100, 0.35);
        color: rgba(255, 120, 130, 0.9);
        box-shadow: 0 0 20px rgba(255, 60, 80, 0.15);
      }

      .quit-btn:active {
        transform: translateX(-50%) scale(0.96);
      }
    </style>
  </head>

  <body>
    <div class="ambient"></div>
    <div class="grid"></div>
    <main class="shell">
      <section class="brand">
        <div class="mark-wrap">
          <div class="mark-glow"></div>
          <svg
            class="mark"
            viewBox="0 0 1024 1024"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <defs>
              <linearGradient
                id="bg"
                x1="155"
                y1="76"
                x2="869"
                y2="948"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0" stop-color="#1f1b18" />
                <stop offset="0.42" stop-color="#0c0a09" />
                <stop offset="1" stop-color="#020202" />
              </linearGradient>

              <radialGradient
                id="warmGlow"
                cx="0"
                cy="0"
                r="1"
                gradientUnits="userSpaceOnUse"
                gradientTransform="translate(310 214) rotate(47) scale(590 465)"
              >
                <stop offset="0" stop-color="#c4a882" stop-opacity=".42" />
                <stop offset=".34" stop-color="#7d634d" stop-opacity=".16" />
                <stop offset="1" stop-color="#000000" stop-opacity="0" />
              </radialGradient>

              <radialGradient
                id="coolGlow"
                cx="0"
                cy="0"
                r="1"
                gradientUnits="userSpaceOnUse"
                gradientTransform="translate(735 310) rotate(122) scale(460 360)"
              >
                <stop offset="0" stop-color="#e8dbc9" stop-opacity=".19" />
                <stop offset=".44" stop-color="#78716c" stop-opacity=".08" />
                <stop offset="1" stop-color="#000000" stop-opacity="0" />
              </radialGradient>

              <linearGradient
                id="glassPanel"
                x1="306"
                y1="195"
                x2="764"
                y2="773"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0" stop-color="#ffffff" stop-opacity=".16" />
                <stop offset=".32" stop-color="#ffffff" stop-opacity=".055" />
                <stop offset="1" stop-color="#ffffff" stop-opacity=".025" />
              </linearGradient>

              <linearGradient
                id="pageFill"
                x1="255"
                y1="198"
                x2="549"
                y2="691"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0" stop-color="#f9f6f2" />
                <stop offset=".55" stop-color="#e8dbc9" />
                <stop offset="1" stop-color="#c4a882" />
              </linearGradient>

              <linearGradient
                id="aiStroke"
                x1="515"
                y1="306"
                x2="787"
                y2="664"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0" stop-color="#f2ebe0" />
                <stop offset="1" stop-color="#9a7a5a" />
              </linearGradient>

              <linearGradient
                id="qStroke"
                x1="322"
                y1="326"
                x2="716"
                y2="720"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0" stop-color="#fdfcfb" />
                <stop offset=".48" stop-color="#d4c5a9" />
                <stop offset="1" stop-color="#7d634d" />
              </linearGradient>

              <filter
                id="softShadow"
                x="106"
                y="112"
                width="812"
                height="820"
                filterUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB"
              >
                <feDropShadow
                  dx="0"
                  dy="34"
                  stdDeviation="44"
                  flood-color="#000000"
                  flood-opacity=".68"
                />
                <feDropShadow
                  dx="0"
                  dy="10"
                  stdDeviation="16"
                  flood-color="#000000"
                  flood-opacity=".48"
                />
              </filter>

              <filter
                id="innerGlow"
                x="170"
                y="154"
                width="684"
                height="716"
                filterUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB"
              >
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feColorMatrix
                  in="blur"
                  type="matrix"
                  values="1 0 0 0 0.95 0 1 0 0 0.82 0 0 1 0 0.62 0 0 0 .52 0"
                />
                <feBlend in2="SourceGraphic" mode="screen" />
              </filter>

              <clipPath id="rounded">
                <rect x="64" y="64" width="896" height="896" rx="214" />
              </clipPath>
            </defs>

            <!-- App tile -->
            <rect x="64" y="64" width="896" height="896" rx="214" fill="url(#bg)" />
            <g clip-path="url(#rounded)">
              <rect x="64" y="64" width="896" height="896" fill="url(#warmGlow)" />
              <rect x="64" y="64" width="896" height="896" fill="url(#coolGlow)" />
              <path
                d="M144 200C268 107 430 105 535 147C640 188 679 276 777 302C875 328 946 289 1005 244V64H64V281C82 254 108 227 144 200Z"
                fill="white"
                opacity=".035"
              />
              <path
                d="M83 785C203 714 314 732 432 786C551 840 695 908 947 826V960H64V800C70 795 76 790 83 785Z"
                fill="#c4a882"
                opacity=".04"
              />
            </g>

            <rect
              x="64"
              y="64"
              width="896"
              height="896"
              rx="214"
              stroke="rgba(255,255,255,.13)"
              stroke-width="3"
            />
            <rect
              x="86"
              y="86"
              width="852"
              height="852"
              rx="195"
              stroke="#c4a882"
              stroke-opacity=".11"
              stroke-width="2"
            />

            <!-- Glass workspace -->
            <g filter="url(#softShadow)">
              <rect
                x="188"
                y="186"
                width="648"
                height="656"
                rx="86"
                fill="url(#glassPanel)"
                stroke="rgba(255,255,255,.16)"
                stroke-width="3"
              />
              <rect x="212" y="211" width="600" height="606" rx="68" fill="#010101" opacity=".34" />
              <path
                d="M235 254C293 219 374 206 467 216C584 228 620 286 727 279C757 277 782 270 806 260V234C806 221 795 210 782 210H242C228 210 217 221 217 235V284C222 274 228 264 235 254Z"
                fill="white"
                opacity=".055"
              />
            </g>

            <!-- PDF page -->
            <g filter="url(#innerGlow)">
              <path
                d="M303 241H492L604 353V690C604 723 577 750 544 750H303C270 750 243 723 243 690V301C243 268 270 241 303 241Z"
                fill="url(#pageFill)"
                stroke="#fff7ed"
                stroke-opacity=".55"
                stroke-width="4"
              />
              <path
                d="M492 242V329C492 347 507 362 525 362H604L492 242Z"
                fill="#f2ebe0"
                opacity=".88"
              />
              <path
                d="M492 242V329C492 347 507 362 525 362H604"
                stroke="#9a7a5a"
                stroke-opacity=".42"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <rect x="305" y="414" width="226" height="20" rx="10" fill="#362a21" opacity=".5" />
              <rect x="305" y="466" width="166" height="18" rx="9" fill="#362a21" opacity=".36" />
              <rect x="305" y="516" width="213" height="18" rx="9" fill="#362a21" opacity=".28" />
              <rect x="305" y="566" width="132" height="18" rx="9" fill="#362a21" opacity=".22" />
            </g>

            <!-- AI web workspace / network -->
            <g opacity=".96">
              <rect
                x="474"
                y="328"
                width="302"
                height="340"
                rx="54"
                fill="#0c0a09"
                fill-opacity=".72"
                stroke="rgba(255,255,255,.13)"
                stroke-width="3"
              />
              <path
                d="M526 426L609 506L705 412"
                stroke="url(#aiStroke)"
                stroke-width="12"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity=".72"
              />
              <path
                d="M609 506L700 593"
                stroke="url(#aiStroke)"
                stroke-width="12"
                stroke-linecap="round"
                opacity=".58"
              />
              <circle cx="526" cy="426" r="34" fill="#f2ebe0" />
              <circle cx="609" cy="506" r="38" fill="#c4a882" />
              <circle cx="705" cy="412" r="31" fill="#e8dbc9" />
              <circle cx="700" cy="593" r="32" fill="#9a7a5a" />
              <circle cx="526" cy="426" r="13" fill="#0c0a09" opacity=".88" />
              <circle cx="609" cy="506" r="15" fill="#0c0a09" opacity=".88" />
              <circle cx="705" cy="412" r="12" fill="#0c0a09" opacity=".88" />
              <circle cx="700" cy="593" r="12" fill="#0c0a09" opacity=".88" />
            </g>

            <!-- Q identity / study loop -->
            <g>
              <circle cx="512" cy="548" r="150" fill="#0c0a09" fill-opacity=".18" />
              <circle
                cx="512"
                cy="548"
                r="130"
                stroke="url(#qStroke)"
                stroke-width="46"
                stroke-linecap="round"
              />
              <path
                d="M603 640L693 730"
                stroke="url(#qStroke)"
                stroke-width="52"
                stroke-linecap="round"
              />
              <path
                d="M602 640L693 730"
                stroke="#0c0a09"
                stroke-opacity=".22"
                stroke-width="22"
                stroke-linecap="round"
              />
              <circle cx="512" cy="548" r="72" fill="#0c0a09" fill-opacity=".78" />
              <path
                d="M466 542C490 506 534 494 570 518"
                stroke="#f9f6f2"
                stroke-opacity=".54"
                stroke-width="14"
                stroke-linecap="round"
              />
            </g>

            <!-- Split divider / active workspace cue -->
            <rect x="500" y="237" width="18" height="132" rx="9" fill="#f9f6f2" opacity=".58" />
            <rect x="506" y="248" width="6" height="110" rx="3" fill="#362a21" opacity=".55" />

            <!-- Bottom subtle base shine -->
            <path
              d="M286 804C403 852 608 862 742 797"
              stroke="#f2ebe0"
              stroke-opacity=".16"
              stroke-width="18"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div>
          <h1 class="app-title">Quizlab Reader</h1>
          <p id="subtitle-text" class="subtitle">AI-Powered Study Environment</p>
        </div>
      </section>

      <div class="meter">
        <div class="meter-bar"></div>
      </div>

      <section class="status-row">
        <div class="status-dot"></div>
        <p id="status-text" class="status-text">Bootstrapping Learning Workspace</p>
      </section>

      <div id="build-text" class="build-text">v0.0.0</div>
    </main>

    <button id="quit-btn" class="quit-btn">Exit App</button>

    <script>
      const userLanguage = navigator.language || navigator.userLanguage
      document.documentElement.lang = userLanguage.startsWith('tr') ? 'tr' : 'en'
      const statusElement = document.getElementById('status-text')
      const subtitleElement = document.getElementById('subtitle-text')
      const buildTextElement = document.getElementById('build-text')

      const copy = userLanguage.startsWith('tr')
        ? {
            status: 'Öğrenme Ortamı Başlatılıyor',
            subtitle: 'Yapay Zeka Destekli Çalışma Alanı'
          }
        : {
            status: 'Bootstrapping Learning Workspace',
            subtitle: 'AI-Powered Study Environment'
          }

      if (statusElement) {
        statusElement.textContent = copy.status
      }
      if (subtitleElement) {
        subtitleElement.textContent = copy.subtitle
      }
      if (buildTextElement) {
        const params = new URLSearchParams(window.location.search)
        const appVersion = params.get('version')
        buildTextElement.textContent = appVersion ? `v${appVersion}` : 'v0.0.0'
      }

      const quitBtn = document.getElementById('quit-btn')
      if (quitBtn) {
        if (userLanguage.startsWith('tr')) {
          quitBtn.textContent = 'Çıkış Yap'
        }
        // Make clickable after animation completes (5s delay + 0.6s anim)
        setTimeout(() => {
          quitBtn.classList.add('visible')
        }, 5600)
        quitBtn.addEventListener('click', () => {
          window.close()
        })
      }
    </script>
  </body>
</html>
