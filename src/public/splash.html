<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizlab Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/splash.css" />
  </head>

  <body>
    <div class="ambient"></div>
    <div class="grid"></div>
    <main class="shell">
      <section class="brand">
        <div class="mark-wrap">
          <div class="mark-glow"></div>
          <img class="mark" src="icons/quizlab-logo.svg" alt="" aria-hidden="true" />
        </div>
        <div>
          <h1 class="app-title">Quizlab Reader</h1>
          <p id="subtitle-text" class="subtitle">AI-Powered Study Environment</p>
        </div>
      </section>

      <div class="meter">
        <div class="meter-bar"></div>
      </div>

      <section class="status-row">
        <div class="status-dot"></div>
        <p id="status-text" class="status-text">Bootstrapping Learning Workspace</p>
      </section>

      <div id="build-text" class="build-text">v0.0.0</div>
    </main>

    <button id="quit-btn" class="quit-btn">Exit App</button>

    <script>
      const userLanguage = navigator.language || navigator.userLanguage
      document.documentElement.lang = userLanguage.startsWith('tr') ? 'tr' : 'en'
      const statusElement = document.getElementById('status-text')
      const subtitleElement = document.getElementById('subtitle-text')
      const buildTextElement = document.getElementById('build-text')

      const copy = userLanguage.startsWith('tr')
        ? {
            status: 'Öğrenme Ortamı Başlatılıyor',
            subtitle: 'Yapay Zeka Destekli Çalışma Alanı'
          }
        : {
            status: 'Bootstrapping Learning Workspace',
            subtitle: 'AI-Powered Study Environment'
          }

      if (statusElement) {
        statusElement.textContent = copy.status
      }
      if (subtitleElement) {
        subtitleElement.textContent = copy.subtitle
      }
      if (buildTextElement) {
        const params = new URLSearchParams(window.location.search)
        const appVersion = params.get('version')
        buildTextElement.textContent = appVersion ? `v${appVersion}` : 'v0.0.0'
      }

      const quitBtn = document.getElementById('quit-btn')
      if (quitBtn) {
        if (userLanguage.startsWith('tr')) {
          quitBtn.textContent = 'Çıkış Yap'
        }
        // Make clickable after animation completes (5s delay + 0.6s anim)
        setTimeout(() => {
          quitBtn.classList.add('visible')
        }, 5600)
        quitBtn.addEventListener('click', () => {
          window.close()
        })
      }
    </script>
  </body>
</html>
