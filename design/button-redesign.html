<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizLab Star Tool Button Redesign</title>
  <style>
    :root {
      --bg-0: #07070b;
      --bg-1: #111118;
      --rail-border: rgba(255, 255, 255, 0.09);
      --rail-sheen: rgba(255, 255, 255, 0.12);
      --button-top: #1f1f29;
      --button-bottom: #121219;
      --button-border: rgba(255, 255, 255, 0.16);
      --icon-stroke: rgba(226, 232, 240, 0.74);
      --amber-aura: rgba(251, 191, 36, 0.20);
      --rose-aura: rgba(244, 63, 94, 0.16);
      --focus-ring: rgba(212, 165, 116, 0.54);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(500px 280px at 22% 16%, rgba(251, 191, 36, 0.10), transparent 60%),
        radial-gradient(460px 340px at 78% 84%, rgba(244, 63, 94, 0.08), transparent 64%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      font-family: "Segoe UI", sans-serif;
      color: #fff;
    }

    .stage {
      width: 184px;
      height: 220px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      box-shadow:
        0 22px 42px -24px rgba(0, 0, 0, 0.75),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .rail {
      position: relative;
      width: 72px;
      height: 176px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--rail-border);
      background:
        linear-gradient(95deg, rgba(62, 46, 34, 0.42) 0%, rgba(97, 67, 43, 0.34) 20%, rgba(20, 18, 26, 0.78) 54%, rgba(19, 17, 24, 0.94) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.01));
      box-shadow:
        0 24px 36px -22px rgba(0, 0, 0, 0.86),
        inset 1px 0 0 rgba(255, 255, 255, 0.10),
        inset -1px 0 0 rgba(0, 0, 0, 0.46);
      display: grid;
      place-items: center;
    }

    .rail::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, var(--rail-sheen) 32%, transparent 78%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), transparent 40%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .rail::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .star-btn {
      position: relative;
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 18px;
      display: grid;
      place-items: center;
      cursor: pointer;
      background: linear-gradient(165deg, var(--button-top) 0%, var(--button-bottom) 100%);
      box-shadow:
        0 10px 18px -10px rgba(0, 0, 0, 0.88),
        0 0 0 1px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 var(--button-border),
        inset 0 -10px 16px rgba(0, 0, 0, 0.30),
        inset 0 14px 18px rgba(255, 255, 255, 0.015);
      transition: transform 140ms ease, box-shadow 220ms ease;
      isolation: isolate;
    }

    .star-btn::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 24% 22%, var(--amber-aura), transparent 48%),
        radial-gradient(circle at 78% 84%, var(--rose-aura), transparent 58%);
      filter: blur(5px);
      opacity: 0.72;
      z-index: -1;
    }

    .star-btn:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 2px var(--focus-ring),
        0 0 0 5px rgba(212, 165, 116, 0.16),
        0 12px 24px -12px rgba(0, 0, 0, 0.88),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -10px 16px rgba(0, 0, 0, 0.36);
    }

    .star-btn:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow:
        0 13px 24px -12px rgba(0, 0, 0, 0.90),
        0 0 0 1px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.20),
        inset 0 -10px 14px rgba(0, 0, 0, 0.34),
        inset 0 14px 18px rgba(255, 255, 255, 0.02);
    }

    .star-btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow:
        0 6px 10px -8px rgba(0, 0, 0, 0.90),
        inset 0 2px 5px rgba(0, 0, 0, 0.50),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .star-icon {
      width: 22px;
      height: 22px;
      stroke: var(--icon-stroke);
      stroke-width: 1.85;
      fill: none;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.10));
    }

    .caption {
      position: absolute;
      bottom: 18px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(226, 232, 240, 0.5);
      user-select: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="rail" aria-hidden="true">
      <button class="star-btn" type="button" aria-label="Pin tool">
        <svg class="star-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3.2l2.72 5.5 6.08.88-4.4 4.3 1.04 6.07L12 17.1l-5.44 2.85 1.04-6.07-4.4-4.3 6.08-.88L12 3.2z" />
        </svg>
      </button>
    </div>
    <div class="caption">QuizLab Tool</div>
  </main>
</body>
</html>
